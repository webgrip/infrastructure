name: '[Workflow] On Documentation Change'

# Forgejo mirror of .github/workflows/on_docs_change.yml. GitHub deploys to GitHub Pages; the
# Forgejo path has no native Pages, so it publishes the built site to Codeberg Pages — the interim,
# off-site host (ADR-0038; ADR-0039 = the later in-cluster Backstage target). The deploy reusable force-pushes the site to a Codeberg repo's `pages`
# branch using a scoped CODEBERG_TOKEN (provisioned as an org Actions secret from OpenBao). The
# in-cluster Backstage TechDocs surface is the later target (ADR-0039).

on:
  push:
    branches:
      - '*'
    paths:
      - 'docs/techdocs/**'
      - '.forgejo/workflows/on_docs_change.yml'
  workflow_dispatch:
    inputs:
      source-dir:
        type: string
        description: 'The directory containing the techdocs files'
        required: false
        default: 'docs/techdocs'

jobs:
  generate-documentation:
    name: 'Generate'
    uses: webgrip/workflows/.forgejo/workflows/techdocs-generate.yml@990a6fa4cb2a0ad16089a0c4b8cbf42d325e28e6 # main
    with:
      source-dir: ${{ github.event.inputs.source-dir || 'docs/techdocs' }}

  deploy-documentation:
    name: 'Deploy (Codeberg Pages)'
    uses: webgrip/workflows/.forgejo/workflows/techdocs-deploy-codeberg.yml@990a6fa4cb2a0ad16089a0c4b8cbf42d325e28e6 # main
    needs: generate-documentation
    if: github.ref == 'refs/heads/main'
    with:
      # Handoff: create this NON-mirror Codeberg repo (a pull-mirror's pages branch can't be pushed),
      # set DNS `docs.webgrip.dev CNAME webgrip.codeberg.page`, and seed the token (see ADR-0038 §Ops).
      codeberg-repo: infrastructure-techdocs
      domain: docs.webgrip.dev
    secrets:
      CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
