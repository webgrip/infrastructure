name: '[Workflow] On Release Published'

# Forgejo mirror of .github/workflows/on_release_published.yml. Adaptations:
#   - publishes to the in-cluster Harbor (harbor.webgrip.dev, LAN-only) instead of
#     GHCR, via the Forgejo-only reusable workflow docker-build-and-push-harbor.yml
#     which pins runs-on: docker (the in-cluster runner is the only one that reaches Harbor).
#   - supply chain: cosign signs + attests via OpenBao Transit (the key never leaves
#     OpenBao; the runner authenticates with its k8s ServiceAccount — no GitHub OIDC/Fulcio)
#     and uploads the SBOM to Dependency-Track — see the local
#     .forgejo/actions/cosign-sign-attest. GitHub-only bits (SLSA build provenance,
#     Trivy SARIF -> GitHub Security tab) have no Forgejo analog and are omitted.
# Dual-publish: the .github/ pipeline keeps pushing to GHCR, untouched.

concurrency:
  group: release-${{ github.ref }}-${{ github.event.release.id || inputs.tag }}
  cancel-in-progress: true

on:
  release:
    types: [published]
  # Forgejo adaptation: a release created from inside a CI job does NOT emit a `release`
  # Actions event (loop-prevention), so the .forgejo semantic-release action dispatches this
  # workflow explicitly after cutting a release. The `release` trigger still serves manual UI
  # releases. (The .github side needs no dispatch — its App-token release does fire the event.)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. techdocs-builder-v1.2.3'
        required: true
        type: string
      is_prerelease:
        description: 'Whether this is a prerelease'
        required: false
        default: 'false'
        type: string

jobs:
  parse-release-tag:
    name: 'Parse tag'
    # In-cluster Forgejo has a single ephemeral runner pool advertising `docker`.
    runs-on: docker
    outputs:
      image: ${{ steps.parse.outputs.image }}
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
      created: ${{ steps.parse.outputs.created }}
    steps:
      - id: parse
        name: Extract image + version
        shell: bash
        run: |
          set -euo pipefail
          # workflow_dispatch (Forgejo CI path) passes the tag as an input; the release event
          # supplies it via github.event.release.tag_name.
          tag='${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}'

          if [[ "$tag" =~ ^(.+)-v(.+)$ ]]; then
            image="${BASH_REMATCH[1]}"
            version="${BASH_REMATCH[2]}"
          else
            echo "Unsupported tag format: $tag" >&2
            echo "Expected: <image>-v<version> (e.g. helm-deploy-v1.2.3)" >&2
            exit 1
          fi

          # Release event carries a publish timestamp; a dispatch does not, so stamp now.
          created='${{ github.event.release.published_at || github.event.release.created_at }}'
          if [[ -z "$created" ]]; then created="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; fi

          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${{ github.event_name == 'workflow_dispatch' && inputs.is_prerelease || github.event.release.prerelease }}" >> "$GITHUB_OUTPUT"
          echo "created=$created" >> "$GITHUB_OUTPUT"

  # ONE distribute job for BOTH prereleases and final releases. Do NOT split into two
  # is_prerelease-gated reusable-workflow jobs: Forgejo flattens a reusable workflow's inner jobs
  # into this caller's graph and does NOT apply the caller job's `if:` to those flattened jobs — so
  # a "skipped" prerelease distribute STILL ran its flattened build, giving two concurrent builds
  # racing on the same Harbor tag + buildx :cache ref. The only prerelease difference is the
  # :latest tag, gated inline in docker-tags below.
  release-distribute-harbor:
    name: 'Distribute'
    needs: [parse-release-tag]
    permissions:
      contents: read
    uses: webgrip/workflows/.forgejo/workflows/docker-build-and-push-harbor-fast.yml@main
    with:
      registry: harbor.webgrip.dev
      docker-context: "ops/docker/${{ needs.parse-release-tag.outputs.image }}"
      docker-file: "Dockerfile"
      # amd64-only: the homelab (and these runner images' only consumer) is amd64 Talos, so we drop
      # the emulated arm64 build — the dominant build-time cost. The -fast wrapper skips setup-qemu
      # for a pure-amd64 platforms value. See webgrip/homelab-cluster ADR-0036. To restore arm64,
      # set platforms back to "linux/amd64,linux/arm64" (re-enables QEMU automatically).
      platforms: "linux/amd64"
      docker-build-args: |
        IMAGE_CREATED=${{ needs.parse-release-tag.outputs.created }}
        IMAGE_VERSION=${{ needs.parse-release-tag.outputs.version }}
        IMAGE_REVISION=${{ github.sha }}
        # Route base images through Harbor: the Dockerfiles default these to docker.io/ghcr.io
        # (so .github/GHCR builds work unchanged); the in-cluster build overrides them to the
        # Harbor pull-through proxy projects (+ webgrip for the techdocs-builder inter-image dep).
        # Each image only consumes the prefixes it declares; the rest are harmlessly unused.
        REGISTRY_DOCKERHUB=harbor.webgrip.dev/dockerhub
        REGISTRY_GHCR=harbor.webgrip.dev/ghcr
        REGISTRY_MCR=harbor.webgrip.dev/mcr
      # Owner is hardcoded `webgrip` (the Harbor project): Forgejo leaves github.repository_owner
      # EMPTY in this workflow_dispatch-triggered run, which produced `harbor.webgrip.dev//<image>`
      # (empty owner -> double slash -> invalid tag). Bare OWNER/IMAGE[:TAG]; the Harbor workflow
      # prefixes the registry, e.g. webgrip/<image>:<version> -> harbor.webgrip.dev/webgrip/<image>:<version>.
      # :latest only on a FINAL release; on a prerelease the second line resolves to '' and the
      # Harbor engine skips blank tags.
      docker-tags: |
        webgrip/${{ needs.parse-release-tag.outputs.image }}:${{ needs.parse-release-tag.outputs.version }}
        ${{ needs.parse-release-tag.outputs.is_prerelease != 'true' && format('webgrip/{0}:latest', needs.parse-release-tag.outputs.image) || '' }}
    secrets:
      HARBOR_ROBOT_USER: ${{ secrets.HARBOR_ROBOT_USER }}
      HARBOR_ROBOT_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}

  # Dual-publish to GHCR. Forgejo is now the SOLE release authority (GitHub is a pure mirror that cuts
  # no releases), so the in-cluster runner also pushes ghcr.io/webgrip/<image>. Same Harbor-proxy base
  # args, so the GHCR image is byte-identical to the Harbor one. Requires a GitHub PAT with
  # write:packages published as Forgejo org secrets GHCR_USERNAME/GHCR_TOKEN (see forgejo-actions-secrets).
  # NB: these GHCR images are NOT yet cosign-signed (the Sign & Attest job targets Harbor) — sign GHCR
  # too, or relax the ghcr Kyverno policy, before relying on it. amd64-only to match the Harbor build.
  release-distribute-ghcr:
    name: 'Distribute (GHCR)'
    needs: [parse-release-tag]
    permissions:
      contents: read
    uses: webgrip/workflows/.forgejo/workflows/docker-build-and-push-ghcr.yml@main
    with:
      docker-context: "ops/docker/${{ needs.parse-release-tag.outputs.image }}"
      docker-file: "Dockerfile"
      platforms: "linux/amd64"
      docker-build-args: |
        IMAGE_CREATED=${{ needs.parse-release-tag.outputs.created }}
        IMAGE_VERSION=${{ needs.parse-release-tag.outputs.version }}
        IMAGE_REVISION=${{ github.sha }}
        REGISTRY_DOCKERHUB=harbor.webgrip.dev/dockerhub
        REGISTRY_GHCR=harbor.webgrip.dev/ghcr
        REGISTRY_MCR=harbor.webgrip.dev/mcr
      docker-tags: |
        webgrip/${{ needs.parse-release-tag.outputs.image }}:${{ needs.parse-release-tag.outputs.version }}
        ${{ needs.parse-release-tag.outputs.is_prerelease != 'true' && format('webgrip/{0}:latest', needs.parse-release-tag.outputs.image) || '' }}
    secrets:
      REGISTRY_USERNAME: ${{ secrets.GHCR_USERNAME }}
      REGISTRY_TOKEN: ${{ secrets.GHCR_TOKEN }}

  # ── Supply chain security ──────────────────────────────────────────────────
  # cosign signing + CycloneDX SBOM attestation via OpenBao Transit (the key never
  # leaves OpenBao; the runner authenticates with its k8s ServiceAccount) + a
  # Dependency-Track upload. Runs on the in-cluster runner so it can reach Harbor
  # (LAN-only), OpenBao, and Dependency-Track. Signs prereleases and finals alike.
  release-sign-and-attest:
    name: 'Sign & Attest'
    # Depend on BOTH distributes so the images exist before we sign their digests. NB: this couples
    # signing to the GHCR push — provision GHCR_USERNAME/GHCR_TOKEN before relying on this, or the
    # GHCR distribute fails and skips signing for both registries.
    needs: [parse-release-tag, release-distribute-harbor, release-distribute-ghcr]
    runs-on: docker
    # Forgejo: mint a per-job OIDC token (claims: repository/event_name/ref) so the action can
    # authenticate to OpenBao's JWT auth for signing. (permissions: is ignored by Forgejo.)
    enable-openid-connect: true
    permissions:
      contents: read
    steps:
      # Local composite action — requires the repo checked out (checkout@v5, not v6).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # Same OpenBao Transit key signs both registries (each step mints its own OIDC->OpenBao token
      # and signs that registry's digest by reference). Owner hardcoded `webgrip` — github.repository_owner
      # is empty on Forgejo's workflow_dispatch.
      - name: Sign, attest and SBOM (Harbor)
        uses: ./.forgejo/actions/cosign-sign-attest
        with:
          registry: harbor.webgrip.dev
          image-name: harbor.webgrip.dev/webgrip/${{ needs.parse-release-tag.outputs.image }}
          image-version: ${{ needs.parse-release-tag.outputs.version }}
        env:
          REGISTRY_USERNAME: ${{ secrets.HARBOR_ROBOT_USER }}
          REGISTRY_TOKEN: ${{ secrets.HARBOR_ROBOT_TOKEN }}
          DT_API_KEY: ${{ secrets.DT_API_KEY }}
      - name: Sign, attest and SBOM (GHCR)
        uses: ./.forgejo/actions/cosign-sign-attest
        with:
          registry: ghcr.io
          image-name: ghcr.io/webgrip/${{ needs.parse-release-tag.outputs.image }}
          image-version: ${{ needs.parse-release-tag.outputs.version }}
        env:
          REGISTRY_USERNAME: ${{ secrets.GHCR_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DT_API_KEY: ${{ secrets.DT_API_KEY }}
