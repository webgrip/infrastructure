name: '[Workflow] On Source Change'

# Forgejo mirror of .github/workflows/on_source_change.yml. Adaptations:
#   - determine-changed-directories + semantic-release resolve against the .forgejo/ tree
#   - GitHub App token minting is dropped; the CI bot's FORGEJO_TOKEN is used instead
#   - semantic-release publishes via the Gitea/Forgejo plugin (the action sets GITEA_URL, so the
#     shared .releaserc.js selects @saithodev/semantic-release-gitea over @semantic-release/github)
# Releases created here trigger .forgejo/workflows/on_release_published.yml, which builds
# and pushes the image to the in-cluster Harbor.

concurrency:
  group: push-${{ github.ref_name }}

on:
  push:
    branches:
      - '**'
    paths:
      - 'ops/docker/**'
      - '.releaserc.js'
      - '.forgejo/actions/semantic-release-monorepo/action.yml'
      - '.forgejo/workflows/on_source_change.yml'
      - '.forgejo/workflows/on_release_published.yml'

jobs:
  # NB: the caller job id must NOT equal the reusable workflow's inner job id. Forgejo v15
  # flattens an expanded reusable workflow's inner jobs into the caller's graph; when the ids
  # collide the resulting plan has no dependency-free job and Forgejo rejects the workflow with
  # "the workflow must contain at least one job without dependencies". The reusable's inner job is
  # `determine-changed-directories`, so this caller job is named `changed-images`. (GitHub
  # namespaces inner jobs under the caller, so the same file is fine on the .github side.)
  changed-images:
    name: 'Determine changed images'
    uses: webgrip/workflows/.forgejo/workflows/determine-changed-directories.yml@main
    with:
      inside-dir: 'ops/docker'

  release-per-image:
    name: 'Release'
    needs: [changed-images]
    if: >
      always()
      && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
      && needs.changed-images.result == 'success'
      && needs.changed-images.outputs.matrix != '[]'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changed-images.outputs.matrix) }}
    # In-cluster Forgejo has a single ephemeral DinD runner pool advertising `docker`.
    # (semantic-release's verifyReleaseCmd runs `docker build`, so it needs the DinD backend.)
    runs-on: docker
    steps:
      # Local `uses: ./…` actions require the repo on disk first; without this the runner
      # cannot read the action ("failed to read action … no files found … action.yml").
      # Mirrors the .github job's checkout (adapted: checkout v5, since v6 is broken on
      # non-GitHub runners, and the CI bot's FORGEJO_TOKEN instead of a GitHub App token).
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # semantic-release requires all commits/tags
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: Semantic Release (image)
        uses: ./.forgejo/actions/semantic-release-monorepo
        with:
          package-path: ${{ matrix.path }}
          package-name: ${{ matrix.basename }}
          token: ${{ secrets.FORGEJO_TOKEN }}
          # Lets the verifyRelease build reuse the Harbor buildx layer-cache that
          # on_release_published writes, instead of a cold full rebuild every release.
          harbor-robot-user: ${{ secrets.HARBOR_ROBOT_USER }}
          harbor-robot-token: ${{ secrets.HARBOR_ROBOT_TOKEN }}
