name: "[Action] Semantic Release"
description: "Forgejo: run semantic-release for a single monorepo package path (e.g. ops/docker/<image>), publishing releases via the Gitea/Forgejo API."

# Forgejo mirror of .github/actions/semantic-release-monorepo/action.yml. Adaptations:
#   - checkout v6 -> v5 (v6 is broken on non-GitHub runners)
#   - GITHUB_TOKEN auth -> GITEA_URL/GITEA_TOKEN for @saithodev/semantic-release-gitea
#   - sets GITEA_URL below, which makes the shared .releaserc.js select the Gitea/Forgejo publish
#     plugin (@saithodev/semantic-release-gitea) instead of @semantic-release/github

inputs:
  release-type:
    description: "The type of release (reserved for parity with the GitHub action; unused here)"
    required: false
  token:
    description: "Forgejo token used for checkout/push and creating releases"
    required: false
  package-path:
    description: "Path to the package directory (repo-relative), e.g. ops/docker/helm-deploy"
    required: true
  package-name:
    description: "Package name used for tag prefix, e.g. helm-deploy"
    required: true
  registry:
    description: "Registry the verifyRelease build caches against (must match the publish path's registry)"
    required: false
    default: "harbor.webgrip.dev"
  harbor-robot-user:
    description: "Harbor robot user. When set (with the token), the verifyRelease build uses buildx registry cache instead of a cold `docker build`."
    required: false
  harbor-robot-token:
    description: "Harbor robot token. When set (with the user), enables the cached verifyRelease build."
    required: false
  github-release-token:
    description: "GitHub PAT (classic: repo, or fine-grained: contents+read/write) used to mirror the Release object onto the github.com mirror so its Releases tab stays populated. When unset, the mirror step is skipped."
    required: false

outputs:
  version:
    description: "The new version number (from exec plugin writing to $GITHUB_OUTPUT)"
    value: ${{ steps.semantic-release.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: Check out repo
      # Forgejo: the v6 checkout action is broken on non-GitHub runners — pin v5.
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        fetch-depth: 0 # semantic-release requires all commits/tags
        token: ${{ inputs.token || github.token }}

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: "24"

    # Cache the npm download cache so the (unpinned-lockfile) semantic-release install resolves
    # from disk instead of re-fetching ~400 packages every run. Bump the key suffix when the
    # pinned versions below change.
    - name: Cache npm downloads
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-semrel-24.2.7

    # When Harbor creds are provided, set up buildx (docker-container driver — supports
    # `cache-from type=registry`) + log in (the Harbor :cache repo needs auth to pull), then
    # export BUILD_CACHE_REF. .releaserc.js keys on BUILD_CACHE_REF to run the cached buildx
    # verifyRelease build; without these the build falls back to a plain (cold) `docker build`.
    - name: Set up Docker Buildx
      if: ${{ inputs.harbor-robot-token != '' }}
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

    - name: Log in to Harbor (verifyRelease build cache)
      if: ${{ inputs.harbor-robot-token != '' }}
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.harbor-robot-user }}
        password: ${{ inputs.harbor-robot-token }}

    - name: Export build cache ref
      if: ${{ inputs.harbor-robot-token != '' }}
      shell: bash
      # Mirrors docker-build-push-registry's cache tag: it pushes the image to
      # <registry>/<owner>/<image>:<version> and writes buildx cache to the same ref with :cache.
      # Owner is hardcoded `webgrip` to MATCH the publish path (on_release_published also hardcodes
      # webgrip): github.repository_owner is empty on Forgejo here too, which would yield
      # `<registry>//<image>:cache` (double slash) — an invalid ref that never matches the cache.
      run: |
        echo "BUILD_CACHE_REF=${{ inputs.registry }}/webgrip/${{ inputs.package-name }}:cache" >> "$GITHUB_ENV"

    - name: Run semantic-release
      shell: bash
      id: semantic-release
      env:
        GITHUB_OUTPUT: $GITHUB_OUTPUT
        # Literal flag (NOT a vars.* lookup, which is empty when the repo var is unset) that
        # .releaserc.js keys on to select @saithodev/semantic-release-gitea over @semantic-release/github.
        SEMANTIC_RELEASE_GITEA: "true"
        # Forgejo: @saithodev/semantic-release-gitea targets the Gitea-compatible API. Fall back to the
        # runner's instance URL (github.server_url) when the FORGEJO_INSTANCE_URL repo var is unset.
        GITEA_URL: ${{ vars.FORGEJO_INSTANCE_URL || github.server_url }}
        GITEA_TOKEN: ${{ inputs.token || github.token }}
        # Identity for @semantic-release/git's version-bump commit-back (Forgejo-gated in .releaserc.js).
        # checkout@v5 persisted the FORGEJO_TOKEN credentials, so the push back to Forgejo authenticates.
        GIT_AUTHOR_NAME: webgrip-ci
        GIT_AUTHOR_EMAIL: ci@webgrip.nl
        GIT_COMMITTER_NAME: webgrip-ci
        GIT_COMMITTER_EMAIL: ci@webgrip.nl
      run: |
        set -euo pipefail

        pkg_dir="${GITHUB_WORKSPACE}/${{ inputs.package-path }}"
        pkg_name="${{ inputs.package-name }}"
        pkg_json="$pkg_dir/package.json"
        created_pkg_json="false"

        if [[ ! -d "$pkg_dir" ]]; then
          echo "package-path does not exist: $pkg_dir" >&2
          exit 1
        fi

        if [[ ! -f "$pkg_json" ]]; then
          printf '{\n  "name": "%s",\n  "version": "0.0.0",\n  "private": true\n}\n' "$pkg_name" > "$pkg_json"
          created_pkg_json="true"
        fi

        cleanup() {
          if [[ "$created_pkg_json" == "true" ]]; then
            rm -f "$pkg_json" || true
          fi
        }
        trap cleanup EXIT

        cd "$pkg_dir"

        npm install --no-save --no-audit --no-fund \
          semantic-release@24.2.7 \
          semantic-release-monorepo@8.0.2 \
          @semantic-release/commit-analyzer@13.0.0 \
          @semantic-release/exec@7.0.3 \
          @semantic-release/npm@12.0.1 \
          @semantic-release/git@10.0.1 \
          @saithodev/semantic-release-gitea \
          @semantic-release/release-notes-generator@14.0.0 \
          conventional-changelog-conventionalcommits@7.0.2

        # cwd is the package dir, so semantic-release discovers ops/docker/<image>/.releaserc.cjs
        # (which spreads the shared .releaserc.js). GITEA_URL is set above, so that config selects
        # the Gitea/Forgejo publish plugin. (semantic-release has no --config flag; the package
        # config always wins via cosmiconfig regardless, so plugin selection lives in the config.)
        npx semantic-release

    # Forgejo does NOT emit a `release` Actions event for a release created inside a CI job
    # (loop-prevention), so on_release_published.yml never auto-fires here. Dispatch it explicitly
    # for the tag we just cut. steps.semantic-release.outputs.version is ALREADY the full namespaced
    # tag "<image>-v<version>" (e.g. techdocs-builder-v1.2.14) — semantic-release-monorepo emits the
    # tagFormat-prefixed value, NOT a bare semver — which is exactly the format parse-release-tag
    # requires (^(.+)-v(.+)$). Pass it through verbatim; do NOT prepend the package name (that doubles
    # the prefix -> techdocs-builder-vtechdocs-builder-v1.2.14). Empty on a non-releasing run -> no-op.
    - name: Trigger image build + sign (on_release_published)
      if: ${{ steps.semantic-release.outputs.version != '' }}
      shell: bash
      env:
        GITEA_URL: ${{ vars.FORGEJO_INSTANCE_URL || github.server_url }}
        GITEA_TOKEN: ${{ inputs.token || github.token }}
        TAG: ${{ steps.semantic-release.outputs.version }}
        REF: ${{ github.ref_name }}
        REPO: ${{ github.repository }}
        IS_PRERELEASE: ${{ startsWith(github.ref, 'refs/heads/release/') && 'true' || 'false' }}
      run: |
        set -euo pipefail
        echo "Dispatching on_release_published.yml for tag=${TAG} ref=${REF} prerelease=${IS_PRERELEASE}"
        curl -fsS -X POST \
          -H "Authorization: token ${GITEA_TOKEN}" \
          -H "Content-Type: application/json" \
          "${GITEA_URL%/}/api/v1/repos/${REPO}/actions/workflows/on_release_published.yml/dispatches" \
          -d "{\"ref\":\"${REF}\",\"inputs\":{\"tag\":\"${TAG}\",\"is_prerelease\":\"${IS_PRERELEASE}\"}}"

    # Mirror the just-cut release onto the GitHub mirror's Releases tab. Forgejo stays the SOLE release
    # authority (it decided the version + created the canonical Release); this only REFLECTS that object
    # onto github.com. Best-effort: NOT `set -e`, so a GitHub/PAT/mirror-lag hiccup logs a warning and
    # never fails the release or blocks the Harbor build — unlike @semantic-release/github inline, which
    # would abort the whole run. Notes are read back from the Forgejo release so they match exactly.
    - name: Mirror release to GitHub (best-effort)
      if: ${{ steps.semantic-release.outputs.version != '' && inputs.github-release-token != '' }}
      shell: bash
      env:
        GITEA_URL: ${{ vars.FORGEJO_INSTANCE_URL || github.server_url }}
        GITEA_TOKEN: ${{ inputs.token || github.token }}
        GH_TOKEN: ${{ inputs.github-release-token }}
        TAG: ${{ steps.semantic-release.outputs.version }}
        REPO: ${{ github.repository }}
        BRANCH: ${{ github.ref_name }}
        IS_PRERELEASE: ${{ startsWith(github.ref, 'refs/heads/release/') && 'true' || 'false' }}
      run: |
        set -uo pipefail   # deliberately NOT -e: best-effort
        notes="$(curl -fsS -H "Authorization: token ${GITEA_TOKEN}" \
          "${GITEA_URL%/}/api/v1/repos/${REPO}/releases/tags/${TAG}" 2>/dev/null | jq -r '.body // ""')"
        # target_commitish=BRANCH so GitHub resolves the mirrored tag (or creates it at that branch's
        # HEAD if the push-mirror hasn't synced the tag yet).
        body="$(jq -nc --arg t "$TAG" --arg b "$notes" --arg c "$BRANCH" --argjson pre "${IS_PRERELEASE}" \
          '{tag_name:$t, name:$t, body:$b, target_commitish:$c, prerelease:$pre}')"
        code="$(curl -sS -o /tmp/ghrel.json -w '%{http_code}' \
          -X POST -H "Authorization: Bearer ${GH_TOKEN}" -H 'Accept: application/vnd.github+json' \
          "https://api.github.com/repos/${REPO}/releases" -d "$body" || echo 000)"
        case "$code" in
          201) echo "mirrored release ${TAG} to GitHub" ;;
          422) echo "::notice::GitHub release ${TAG} already exists — skipping" ;;
          *)   echo "::warning::GitHub release mirror for ${TAG} -> HTTP ${code}: $(cat /tmp/ghrel.json 2>/dev/null) (non-fatal)" ;;
        esac
